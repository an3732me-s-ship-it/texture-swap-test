<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
     AFRAME.registerComponent('master-controller', {
  tick: function () {
    const dial = document.querySelector('#marker-dial');
    const anchor = document.querySelector('a-marker[url="pattern-connect.patt"]');
    const stair = document.querySelector('#stairModel');

    if (dial && dial.object3D.visible && anchor && anchor.object3D.visible && stair) {
      
      // Calculate distance in AR units
      const dist = dial.object3D.position.distanceTo(anchor.object3D.position);

      // DEBUG: Un-comment the line below to see the numbers in your laptop console
      // console.log("Current Distance:", dist);

      let activeColor;
      // Recalibrated for 5x5cm markers
      if (dist > 2.5) {
        activeColor = '#FFFFFF';      // FAR (More than 12cm away)
      } else if (dist > 1.5) {
        activeColor = '#1976D2'; // MID-FAR (Approx 7-12cm)
      } else if (dist > 0.8) {
        activeColor = '#FF00FF'; // NEAR (Approx 4-7cm)
      } else {
        activeColor = '#444444'; // TOUCHING / VERY CLOSE
      }

      const mesh = stair.getObject3D('mesh');
      if (mesh) {
        mesh.traverse((node) => {
          if (node.isMesh) {
            node.material.color.set(activeColor);
          }
        });
      }
    }
  }
});
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" master-controller>
      
      <a-entity light="type: ambient; intensity: 0.7;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" 
                  gltf-model="url(stair.glb)" 
                  scale="12 12 12" 
                  position="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker id="marker-dial" type="pattern" url="pattern-texture.patt">
        <a-sphere id="status-sphere" radius="0.1" position="0 0.2 0" color="white"></a-sphere>
        <a-torus radius="0.5" radius-tubular="0.01" color="white" rotation="90 0 0" opacity="0.5"></a-torus>
        <a-box position="0 0 -0.6" scale="0.1 0.05 0.4" color="red"></a-box>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
