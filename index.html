<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
   AFRAME.registerComponent('material-dial', {
  tick: function () {
    const stair = document.querySelector('#stairModel');
    const dialMarker = document.querySelector('#marker-texture');

    if (dialMarker && dialMarker.object3D.visible && stair) {
      // 1. Get the Raw Rotation
      let rotY = THREE.MathUtils.radToDeg(dialMarker.object3D.rotation.y);
      
      // 2. Normalize to a clean 0-360 range
      let angle = ((rotY % 360) + 360) % 360;

      // DEBUG: This helps you see the actual number in your browser inspector
      // console.log("Current Angle:", angle);

      const mesh = stair.getObject3D('mesh');
      if (mesh) {
        mesh.traverse((node) => {
          if (node.isMesh) {
            // 3. Precise Quadrants (45 degree offsets)
            if (angle >= 315 || angle < 45) {
              node.material.color.set('#D32F2F'); // RED (Front)
            } 
            else if (angle >= 45 && angle < 135) {
              node.material.color.set('#1976D2'); // BLUE (Right)
            } 
            else if (angle >= 135 && angle < 225) {
              node.material.color.set('#1B5E20'); // GREEN (Back)
            } 
            else {
              node.material.color.set('#808080'); // GREY (Left - Replaced Yellow)
            }
          }
        });
      }
    }
  }
});
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; patternRatio: 0.7;" material-dial>
      
      <a-entity light="type: ambient; intensity: 0.6;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 2"></a-entity>

      <a-marker type="pattern" url="pattern-connect.patt">
        <a-entity id="stairModel" 
                  gltf-model="url(stair.glb)" 
                  scale="12 12 12" 
                  position="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker id="marker-texture" type="pattern" url="pattern-texture.patt">
        <a-torus radius="0.5" radius-tubular="0.01" color="white" rotation="90 0 0" opacity="0.3"></a-torus>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
